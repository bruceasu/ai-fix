name: mysql-client
description: Run MySQL queries by preferring native mysql and falling back to the local bundled mysql-go client in this tool directory.
autoExecuteAllowed: true
tool:
  type: external-command
  program: python
  args:
    - ./run.py

arguments:
  - name: query
    type: string
    description: SQL query string to execute
    required: false
  - name: file
    type: string
    description: SQL file path or - for stdin
    required: false
  - name: host
    type: string
    description: MySQL host override
    required: false
  - name: port
    type: string
    description: MySQL port override
    required: false
  - name: database
    type: string
    description: MySQL database name
    required: false
  - name: user
    type: string
    description: MySQL user
    required: false
  - name: password
    type: string
    description: MySQL password
    required: false
  - name: sslMode
    type: string
    description: MYSQL_SSL_MODE override
    required: false
  - name: defaultsFile
    type: string
    description: Path to .my.cnf; defaults to ./my.cnf in this tool directory
    required: false
  - name: tuplesOnly
    type: string
    description: true to request tuple-only output
    required: false
    defaultValue: "false"
