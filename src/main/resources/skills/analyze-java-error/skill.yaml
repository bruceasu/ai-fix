name: analyze-java-error
description: Analyze a Java exception or stack trace and return a structured diagnosis.
autoExecuteAllowed: true
arguments: []
steps:
  - id: analysis
    type: tool
    toolName: llm
    outputKey: analysis
    arguments:
      prompt: |
        You are a senior Java engineer.
        Analyze the following exception or stack trace and return:
        [Problem Type]
        ...
        [Possible Causes]
        1. ...
        2. ...
        [Location]
        ...
        [Suggestions]
        1. ...
        2. ...

        Requirements:
        - Only analyze and suggest next steps
        - Do not modify code or run deployment actions
        - Keep the result concise and concrete

        Input:
        ${input.text}
