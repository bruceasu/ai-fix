name: review-method-optimization
description: Review a specific method and provide optimization suggestions for performance, readability, and maintainability.
autoExecuteAllowed: true
arguments:
  - name: symbol
    type: string
    description: The name of the method to review.
    required: true
  - name: container
    type: string
    description: The class or container name where the method is located.
    required: false
steps:
  - id: methodCode
    type: tool
    toolName: index-symbol-reader
    outputKey: methodCode
    arguments:
      symbol: ${input.symbol}
      container: ${input.container}
  - id: review
    type: tool
    toolName: llm
    outputKey: review
    arguments:
      prompt: |
        You are a senior software architect and performance expert.
        Review the following method code and provide specific, actionable optimization suggestions.

        Focus on:
        1. Performance (e.g., time/space complexity, redundant operations, resource management).
        2. Readability and Maintainability (e.g., naming, flow control, modularization).
        3. Error Handling and Robustness.
        4. Modern language features or library alternatives (e.g., Java Streams, optional, etc.).

        Requirements:
        - Be specific: refer to line numbers or code snippets if possible.
        - Provide code examples for the suggested optimizations.
        - Explain the "why" behind each suggestion.
        - If the code is already well-optimized, state that clearly.

        Method Code:
        ${methodCode}
