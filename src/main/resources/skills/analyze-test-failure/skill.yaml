name: analyze-test-failure
description: Analyze test output and return a structured diagnosis with concrete next steps.
autoExecuteAllowed: true
arguments: []
steps:
  - id: analysis
    type: tool
    toolName: llm
    outputKey: analysis
    arguments:
      prompt: |
        You are a test engineering expert.
        Analyze the following test output and return:
        [Problem Type]
        ...
        [Possible Causes]
        1. ...
        2. ...
        [Location]
        ...
        [Suggestions]
        1. ...
        2. ...

        Requirements:
        - Identify the failing test and likely cause
        - Provide concrete repair directions
        - Include a short code example when helpful
        - Do not modify code or run deployment actions

        Input:
        ${input.text}
