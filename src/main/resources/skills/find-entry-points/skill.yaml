name: find-entry-points
description: Read project-summary.json and explain the most likely project entry points.
autoExecuteAllowed: true
arguments: []
steps:
  - id: summaryJson
    type: tool
    toolName: project-summary-reader
    outputKey: summaryJson
    arguments:
      path: ${input.path}
  - id: explanation
    type: tool
    toolName: llm
    outputKey: explanation
    arguments:
      prompt: |
        You are a senior developer assistant.
        Based on the following project-summary.json, identify likely entry points and explain:
        1. The true startup entry point or main executable entry
        2. External request entry points such as controllers, handlers, or routers
        3. Where to start reading if someone wants to trace the main execution flow
        4. If entry points are unclear, explain the uncertainty explicitly

        Requirements:
        - Use only the provided summary
        - Do not invent entry points
        - Keep the output concise

        project-summary.json:
        ${summaryJson}
