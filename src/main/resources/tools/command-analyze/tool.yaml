name: command-analyze
description: Bridge to the core analyze command logic for structured error or log analysis.
autoExecuteAllowed: true
tool:
  type: builtin
  command: command_analyze
arguments:
  - name: input
    type: string
    description: Raw error, log, or test output text
    required: true
  - name: provider
    type: string
    description: Optional provider override
    required: false
  - name: model
    type: string
    description: Optional model override
    required: false
