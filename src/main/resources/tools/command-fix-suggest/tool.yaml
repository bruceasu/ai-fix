name: command-fix-suggest
description: Bridge to the core fix logic in suggestion-only mode without modifying files.
autoExecuteAllowed: true
tool:
  type: builtin
  command: command_fix_suggest
arguments:
  - name: task
    type: string
    description: Repair task description
    required: true
  - name: symbol
    type: string
    description: Symbol name filter
    required: false
  - name: container
    type: string
    description: Container, module, or class filter
    required: false
  - name: match
    type: string
    description: Fuzzy match query
    required: false
  - name: package
    type: string
    description: Package filter
    required: false
  - name: file
    type: string
    description: File path fragment filter
    required: false
  - name: limit
    type: number
    description: Limit of matched symbols
    required: false
    defaultValue: 1
  - name: indexPath
    type: string
    description: Path to index.json
    required: false
    defaultValue: index.json
  - name: projectSummaryPath
    type: string
    description: Optional path to project-summary.json
    required: false
  - name: provider
    type: string
    description: Optional provider override
    required: false
  - name: model
    type: string
    description: Optional model override
    required: false
