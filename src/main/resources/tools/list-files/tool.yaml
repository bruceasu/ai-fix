name: list-files
description: List files under a directory for project exploration.
autoExecuteAllowed: true
tool:
  type: builtin
  command: list_files
arguments:
  - name: root
    type: string
    description: Root directory to scan
    required: false
    defaultValue: .
  - name: glob
    type: string
    description: Simple path fragment filter
    required: false
    defaultValue: ""
  - name: limit
    type: number
    description: Maximum number of files
    required: false
    defaultValue: "50"
