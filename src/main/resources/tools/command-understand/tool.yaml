name: command-understand
description: Bridge to the core understand command logic and generate project summary artifacts.
autoExecuteAllowed: true
tool:
  type: builtin
  command: command_understand
arguments:
  - name: sourceRoot
    type: string
    description: Project root to analyze
    required: false
    defaultValue: .
  - name: language
    type: string
    description: auto, java, go, or python
    required: false
    defaultValue: auto
  - name: outputJson
    type: string
    description: Output path for project-summary.json
    required: false
    defaultValue: project-summary.json
  - name: outputMarkdown
    type: string
    description: Output path for understand.md
    required: false
    defaultValue: understand.md
  - name: provider
    type: string
    description: Optional provider override
    required: false
  - name: model
    type: string
    description: Optional model override
    required: false
